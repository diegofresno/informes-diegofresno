<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuestos — Acceso privado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #0080a8;
    --bg:   #fafcff;
    --text: #0f1c2e;
    --muted: #5a6a7e;
    --border: #dde4ee;
    --white: #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 56px 48px;
    max-width: 440px;
    width: 100%;
    text-align: center;
  }

  .lock {
    width: 52px;
    height: 52px;
    background: #e8f5fa;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
  }

  .logo {
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 900;
    color: var(--text);
    text-decoration: none;
    margin-bottom: 32px;
    display: block;
  }

  .logo span { color: var(--cyan); }

  h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 22px;
    font-weight: 900;
    margin-bottom: 12px;
    line-height: 1.2;
  }

  p {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.6;
  }

  footer {
    margin-top: 40px;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="card">
  <a class="logo" href="https://diegofresno.com">diego<span>fresno</span>.com</a>

  <div class="lock">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0080a8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <h1>Portal de acceso privado</h1>
  <p>Este espacio es exclusivo para clientes. Si eres uno de ellos, usa la URL que te enviamos&nbsp;;&#8209;)</p>
</div>

<footer>diegofresno.com &middot; Consultoría SEO</footer>

</body>
</html>
