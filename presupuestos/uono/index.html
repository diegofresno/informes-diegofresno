<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuestos — UONO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan:    #0080a8;
    --cyan-bg: #e8f5fa;
    --teal:    #08876e;
    --bg:      #fafcff;
    --text:    #0f1c2e;
    --muted:   #5a6a7e;
    --border:  #dde4ee;
    --white:   #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 20px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header .logo {
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--text);
    text-decoration: none;
  }

  header .logo span { color: var(--cyan); }

  main {
    flex: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 72px 48px;
    width: 100%;
  }

  .client-header {
    margin-bottom: 40px;
  }

  .client-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .client-name {
    font-family: 'Poppins', sans-serif;
    font-size: 30px;
    font-weight: 900;
    margin-bottom: 6px;
  }

  .client-meta {
    font-size: 14px;
    color: var(--muted);
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .report-list { display: flex; flex-direction: column; gap: 12px; }

  .report-link {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    border-radius: 10px;
    background: var(--white);
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: border-color .15s, box-shadow .15s;
  }

  .report-link:hover {
    border-color: var(--cyan);
    box-shadow: 0 4px 16px rgba(0,128,168,.08);
  }

  .report-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--cyan-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .report-info { flex: 1; }

  .report-title {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 3px;
  }

  .report-desc {
    font-size: 12px;
    color: var(--muted);
  }

  .report-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--cyan-bg);
    color: var(--cyan);
    padding: 3px 9px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  footer {
    text-align: center;
    padding: 28px;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="/">diego<span>fresno</span>.com</a>
</header>

<main>
  <div class="client-header">
    <div class="client-eyebrow">Presupuestos</div>
    <div class="client-name">UONO</div>
    <div class="client-meta">uono.es · Madrid</div>
  </div>

  <hr class="divider">

  <div class="section-label">Julio 2026</div>

  <div class="report-list">
    <a class="report-link" href="propuesta-web-2026-07.html">
      <div class="report-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0080a8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <div class="report-info">
        <div class="report-title">Propuesta SEO | GEO | Nueva web</div>
        <div class="report-desc">Arquitectura web, plan editorial, plan SEO/GEO y comparativa de tecnologías</div>
      </div>
      <span class="report-badge">Jul 2026</span>
    </a>
  </div>
</main>

<footer>
  Preparado por diegofresno.com
</footer>

</body>
</html>
